<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>QR Code Beaute d Orient</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
body{margin:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;}
#qr{background:white;padding:15px;margin-bottom:1rem;}
.titre{color:#C9A96E;font-family:Georgia,serif;font-size:1.2rem;font-style:italic;margin-bottom:0.5rem;}
.url{color:#C9A96E;font-family:Arial,sans-serif;font-size:0.85rem;opacity:0.7;}
.btn{margin-top:1rem;padding:0.8rem 2rem;background:#C9A96E;color:#000;border:none;font-weight:bold;cursor:pointer;font-size:0.85rem;}
</style>
</head>
<body>
<div class="titre">✦ Beaute d'Orient ✦</div>
<div id="qr"></div>
<div class="url">beauteorient.fr</div>
<button class="btn" onclick="window.print()">Imprimer</button>
<script>
new QRCode(document.getElementById("qr"), {
  text: "https://www.beauteorient.fr",
  width: 250,
  height: 250,
  colorDark: "#000000",
  colorLight: "#ffffff",
  correctLevel: QRCode.CorrectLevel.H
});
</script>
</body>
</html>
